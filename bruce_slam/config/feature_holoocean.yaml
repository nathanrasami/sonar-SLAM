# Feature extraction config for HoloOcean simulation (polar sensor_msgs/Image)
# Sonar params: set range_m and fov_deg to match HoloOcean sonar config
CFAR:
  Ntc: 20
  Ngc: 4
  Pfa: 0.1
  rank: 10
  alg: 'SOCA'

filter:
  # 07-03 : 80/10 ne laissait que ~29 pts/KF (murs lointains détectés mais quasi
  # invisibles). Le simu est propre (peu de speckle) → extraction plus généreuse.
  # 2026-07-12 : 50→30 (directive Nathan) PUIS revert 30→50 le soir même, AVANT
  # tout run : le 30 (jamais validé pipeline, émulation seulement) aurait fait 2
  # variables sur le 1er run traj7 (trajectoire 2-3 m + RangeMax 20). Ordre :
  # run 1 traj7 à 50 (baseline, valeur validée — à 2-3 m les échos sont plus
  # forts, la bande 26-50 coupée mesurée sur traj6 est peut-être moindre), puis
  # run 2 à 30 = ablation 1 variable. Argumentaire du 30 (bags 15× plus faibles
  # que test.bag, bruit p99 8-9 → marge ×3 : FABLE §9) reste valable. Témoins
  # seuil 50 : runs 005329 (carte) / 013055 (loops). Journal : PROGRESS 2026-07-12.
  # Run 2 traj7 (2026-07-12 soir) : 50→30 pour l'ablation 1 variable — baseline
  # 50 = run 191325 (ATE 0.058, 2.6 feat/KF : bande 26-50 des pilotis coupée,
  # mesuré). Comparer feat/KF, NN carte, ATE vs 191325.
  threshold: 30
  resolution: 0.5
  radius: 1.0
  min_points: 5
  skip: 1

visualization:
  coordinates: 'polar'
  radius: 2
  color: [0, 165, 255]

compressed_images: False
cartesian_mode: False

# Descripteur SONAR Context (publié seulement si enable — surchargé par le launch
# quand method=bruce_sonar). intensity_threshold 5 recalibré traj7r 2026-07-13 :
# l'ancien 95 (calibré P900 Aracati) dépassait le max GLOBAL du bag (75.5/255)
# → descripteur identiquement VIDE, 0 loop (mémoire traj7r-sc-descripteur-sature).
# Bench 40 vraies + 40 fausses paires tour1↔tour2 : 5 → AUC 0.85 (95 → 0.50 ; 2 → 0.84).
# ⚠ TOUJOURS vérifier au 1er run sur un nouveau bag que le contexte n'est pas vide.
sonar_context:
  enable: False
  num_azimuth: 40
  num_range: 40
  intensity_threshold: 5
