# Feature extraction config for HoloOcean simulation (polar sensor_msgs/Image)
# Sonar params: set range_m and fov_deg to match HoloOcean sonar config
CFAR:
  Ntc: 20
  Ngc: 4
  Pfa: 0.1
  rank: 10
  alg: 'SOCA'

filter:
  # 07-03 : 80/10 ne laissait que ~29 pts/KF (murs lointains détectés mais quasi
  # invisibles). Le simu est propre (peu de speckle) → extraction plus généreuse.
  # 2026-07-12 : 50→30 (directive Nathan). Le 50 avait été calibré sur le test.bag
  # du collègue, 15× plus intense que nos bags (FABLE §9) : la bande 26-50 des
  # pilotis était coupée. Bruit p99 = 8-9 mono8 → 30 garde ×3 de marge ; émulation
  # 07-11 : ×3.3 pts, quais lisibles (+ bavure assumée). Témoins seuil 50 :
  # runs 005329 (carte) / 013055 (loops). Journal : PROGRESS §REPRISE 2026-07-12.
  threshold: 30
  resolution: 0.5
  radius: 1.0
  min_points: 5
  skip: 1

visualization:
  coordinates: 'polar'
  radius: 2
  color: [0, 165, 255]

compressed_images: False
cartesian_mode: False

# Descripteur SONAR Context (publié seulement si enable — surchargé par le launch
# quand method=bruce_sonar). intensity_threshold calibré P900 (95) : sur les
# images propres du simulateur, vérifier que le contexte n'est pas vide (log au 1er run).
sonar_context:
  enable: False
  num_azimuth: 40
  num_range: 40
  intensity_threshold: 95
