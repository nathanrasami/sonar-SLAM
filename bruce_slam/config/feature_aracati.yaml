# Feature extraction config for Aracati2017 dataset (BlueView P900-130, cartesian PNG)
CFAR:
  Ntc: 40
  Ngc: 10
  # 0.1 = 10% des cellules de bruit passent → la carte devient un disque de
  # speckle (arcs à la portée max). DISO ne garde que gradient>170, lui.
  Pfa: 0.01
  rank: 10
  alg: 'SOCA'

filter:
  threshold: 50
  resolution: 0.5
  radius: 1.0
  min_points: 5
  skip: 1

visualization:
  coordinates: 'cartesian'
  radius: 2
  color: [0, 165, 255]

compressed_images: False

# Aracati2017 cartesian mode
cartesian_mode: True
cartesian:
  fov_deg: 130.0
  # même valeur que DISO (config_aracati2017.yaml, Range calibré par SIM3) :
  # le nuage et les poses DISO doivent partager la même échelle m/px
  max_range: 48.2896
