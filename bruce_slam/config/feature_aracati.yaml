# Feature extraction config for Aracati2017 dataset (BlueView P900-130, cartesian PNG)
CFAR:
  Ntc: 40
  Ngc: 10
  # 0.1 = 10% des cellules de bruit passent → la carte devient un disque de
  # speckle (arcs à la portée max). DISO ne garde que gradient>170, lui.
  Pfa: 0.01
  rank: 10
  alg: 'SOCA'

  # 65 : BASELINE 120154 (meilleure traj GT-free, 1.44 m). Features DENSES → assez de
  # points pour l'ICP des loops (12 acceptés vs 6 à seuil 140). Le cloud swirle (fond
  # inclus) — ASSUMÉ ici : on repart de la MEILLEURE TRAJECTOIRE, le nettoyage du cloud
  # se fera séparément (le seuil 140 affamait les loops → traj dégradée 5.2 m). cf. 928d0a0.
filter:
  threshold: 65
  resolution: 0.5
  radius: 1.0
  min_points: 5
  skip: 1

visualization:
  coordinates: 'cartesian'
  radius: 2
  color: [0, 165, 255]

compressed_images: False

# Aracati2017 cartesian mode
cartesian_mode: True
cartesian:
  fov_deg: 130.0
  # même valeur que DISO (config_aracati2017.yaml, Range calibré par SIM3) :
  # le nuage et les poses DISO doivent partager la même échelle m/px
  max_range: 48.2896
  # Cap de portée du NUAGE désactivé : le seuil d'intensité 140 gère le fond à
  # toute distance (les structures brillantes survivent, le fond non). = max_range.
  max_cloud_range: 48.2896

# SONAR Context (place recognition pour loop closure)
sonar_context:
  enable: False
  num_azimuth: 40
  num_range: 40
  # seuil d'intensité du descripteur : ne garde que les retours forts (structure).
  # Le max-pooling de l'intensité brute saturait (AUC 0.55) ; la densité au-dessus
  # de ce seuil discrimine (AUC 0.86, sc_descriptor_bench.py). Pic vers 95-110.
  intensity_threshold: 95
