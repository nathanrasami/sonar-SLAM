# Feature extraction config for Aracati2017 dataset (BlueView P900-130, cartesian PNG)
CFAR:
  Ntc: 40
  Ngc: 10
  # 0.1 = 10% des cellules de bruit passent → la carte devient un disque de
  # speckle (arcs à la portée max). DISO ne garde que gradient>170, lui.
  Pfa: 0.01
  rank: 10
  alg: 'SOCA'

filter:
  # 65 : coupe le speckle résiduel du run 154852 (un bouton à la fois ;
  # si halo encore visible, passer min_points 5→8 au run suivant)
  threshold: 65
  resolution: 0.5
  radius: 1.0
  min_points: 5
  skip: 1

visualization:
  coordinates: 'cartesian'
  radius: 2
  color: [0, 165, 255]

compressed_images: False

# Aracati2017 cartesian mode
cartesian_mode: True
cartesian:
  fov_deg: 130.0
  # même valeur que DISO (config_aracati2017.yaml, Range calibré par SIM3) :
  # le nuage et les poses DISO doivent partager la même échelle m/px
  max_range: 48.2896

# SONAR Context (place recognition pour loop closure)
sonar_context:
  enable: True
  num_azimuth: 40
  num_range: 40
  # seuil d'intensité du descripteur : ne garde que les retours forts (structure).
  # Le max-pooling de l'intensité brute saturait (AUC 0.55) ; la densité au-dessus
  # de ce seuil discrimine (AUC 0.86, sc_descriptor_bench.py). Pic vers 95-110.
  intensity_threshold: 95
