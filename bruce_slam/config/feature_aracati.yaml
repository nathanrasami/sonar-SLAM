# Feature extraction — Aracati2017 (BlueView P900-130, images sonar CARTÉSIENNES).
# = config Bruce + mode cartésien : Aracati publie /son/compressed (cartésien métrique),
# pas du OculusPing polaire. Seul ajout au pipeline d'extraction original.

# Constant false alarm rate (CFAR) params for feature extraction
CFAR:
  Ntc: 40 # number of training cells
  Ngc: 10 # number of guard cells
  Pfa: 0.01 # 0.1 (défaut Bruce) sature le fan d'Aracati de speckle → 0.01
  rank: 10 # matrix rank
  alg: 'SOCA' # method of CFAR, SOCA is best

# point cloud filtering params
filter:
  threshold: 65 # the min CFAR response to be added to the point cloud
  resolution: 0.5 # voxel downsampling res
  radius: 1.0 # outlier rejection radius
  min_points: 5 # outlier rejection min points
  skip: 1 # how often to skip a point cloud, use 1

# the vis params
visualization:
  coordinates: 'cartesian'
  radius: 2
  color: [0, 165, 255]

# are we using compressed imagary (Oculus) — non : mode cartésien ci-dessous
compressed_images: False

# Mode cartésien Aracati : lit /son/compressed, image cartésienne métrique (m/px uniforme)
cartesian_mode: True
cartesian:
  fov_deg: 130.0
  max_range: 48.2896       # portée calibrée (échelle m/px de l'image Aracati)
  max_cloud_range: 48.2896 # cap de portée du nuage = portée max
  # FIX TOURBILLON (2026-07-02, porté depuis Bruce_Sonar_USBL) : y latéral en
  # convention PROPRE (y=+gauche), cohérente avec le cap cmd_vel. L'ancien signe
  # (« même signe que DISO ») peignait chaque scan EN MIROIR du cap → carte
  # tourbillon + SSM/NSSM initialisés à contre-sens (leurs échecs pré-fix sont
  # caducs, cf. ABLATION.md). ⚠ False si odométrie DISO (repère réfléchi).
  flip_bearing: True
