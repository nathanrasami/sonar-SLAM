keyframe_duration: 1.0
keyframe_translation: 1.0
keyframe_rotation: deg(30)

prior_sigmas: [0.1, 0.1, 0.01]
odom_sigmas: [0.5, 0.5, 0.05]   # BASELINE 120154 (cmd_vel). 0.5 = confiance moindre dans
                                # l'odométrie cmd_vel (cap imprécis) → USBL back-end + loops
                                # corrigent plus librement. [0.2] était calibré pour DISO (précis).
icp_odom_sigmas: [0.1, 0.1, 0.01]

icp_config: $(find bruce_slam)/config/icp.yaml

point_resolution: 0.5

# SSM — VERDICT FINAL (07-03, runs 1.3 015742 et 1.4 140908) : sur CETTE branche,
# SSM troque l'ATE contre le cloud : 1.3 (SSM+σ1.4) = MEILLEUR cloud GT-free (NN
# I≥255 0.204→0.173) mais ATE 1.50→2.14 ; 1.4 (SSM+σ2.5) = 3.13 (pire). → CHAMPION
# = config 1.2a (SSM off). Pour un livrable "champion cloud", remettre True + σ1.4
# (= run 1.3). Les verdicts pré-fix (43.5/14.3 m) restent caducs (PIEGES §8).
ssm:
  enable: False
  min_points: 50
  max_translation: 1.5   # serré (3.0→1.5) si réactivé : recalage > 1.5 m suspect → rejeté.
  max_rotation: deg(30)
  target_frames: 3

nssm:
  enable: True
  min_st_sep: 30
  min_points: 30
  max_translation: 8.0
  max_rotation: deg(45)
  source_frames: 5
  cov_samples: 30
  # plafond des bornes de recherche shgo (init ICP global). Sans ce cap, la
  # covariance accumulée (pas de boucle) gonfle les bornes à ±130 m → shgo ne
  # converge pas → 0 boucle. 20 m couvre la dérive locale d'une vraie revisite.
  shgo_max_translation: 20.0
  shgo_max_rotation: deg(180)

pcm_queue_size: 5
min_pcm: 6

# SONAR Context (Kim ICRA 2023) : remplace la DÉTECTION de candidat du NSSM
# (gating covariance + argmax counts) par de la place recognition par
# apparence. L'aval (shgo, ICP+cov, PCM) est inchangé. Journal des décisions
# exporté dans loops_detected.csv.
sonar_context:
  enable: True
  knn: 5                 # candidats présélectionnés par la Polar Key
  # Seuil sur la distance cosinus, calibré sur sc_descriptor_bench.py (descripteur
  # densité-intensité) : vraies revisites médiane ~0.53, fausses ~0.75, seuil de
  # Youden 0.695 (TPR 84%, FPR 24%). 0.65 = un peu conservateur (moins de fausses,
  # les restantes filtrées par ICP+PCM). Affiner sur loops_detected.csv du run.
  dist_threshold: 0.70   # RUN 1.2a (07-03, cf. CONFIGS.md#12a) : diag 1.1 post-fix miroir =
                         # +108 candidats VRAIS (0 faux) entre 0.60 et 0.70, la porte géométrique
                         # 20 m filtre en amont et PCM marche enfin (6→82 constraints). L'échec
                         # historique de 0.695 (ATE 5.96) datait du PCM cassé pré-fix : caduc.
                         # Attendu : constraints 82→150+, ATE <1.4. Rollback : 0.60.
  max_azimuth_shift: 10  # ±10 cases × 3.25°/case = ±32.5° de rotation testée
  max_range_shift: 5     # ±5 cases × ~1.2 m/case de translation testée
  # porte géométrique calibrée cmd_vel (cap imprécis → estimé moins fiable que DISO).
  # Run 100943 : gate=20 m laissait passer 244/659 candidats dont des faux courts-terme.
  gate_distance: 10.0
  # U4 (branche Ultime) : UNION des détecteurs — les candidats du gating natif
  # (covariance+argmax counts) s'AJOUTENT à ceux de SC (dédupliqués), le PCM commun
  # tranche. Piloté au run par LOOP_UNION=true ./run_slam.sh (le launch surcharge).
  # coût : jusqu'à 2 shgo/keyframe → RATE=0.5 si le CPU sature. cf. ULTIME.md U4.
  union: False

# USBL — facteurs de POSITION ABSOLUE acoustique dans le graphe (cf. USBL_FACTEURS.md).
# Ancre l'odométrie cmd_vel sur les fixes /usbl_point, indépendamment de la GT.
# Prouvé en sandbox (usbl_sim.py) : ~3 m lisse vs 47 m dead-reckoning. Chaque fix =
# prior unaire robuste (Cauchy) sur x,y seulement (cap laissé à l'odométrie).
usbl:
  enable: True       # ablation : True pour ancrer sur USBL
  sigma: 1.4         # 🏆 CHAMPION (1.2a 003823 + runs finaux BSU_1/2 : 1.45/1.50/1.52,
                     # méd 1.50 — MEILLEURE médiane du stage). La répétabilité (07-05) a
                     # montré que σ1.8 (ex-branche Ultime : 1.47/1.54/1.60) est ÉQUIVALENT
                     # dans la variance ICP ±0.1 → on garde 1.4. Rejouer un σ :
                     # USBL_SIGMA=x ./run_slam.sh. (SSM+σ2.5 = 3.13 ; Bruce pur → σ2.5.)
  flip_y: False      # False pour odom_source=cmd_vel (repère monde, compas). Mettre True
                     # UNIQUEMENT avec odom_source=diso (DISO sort en repère réfléchi Y :
                     # sans flip → ATE 13.9 m, avec → ~0.9 m).
  max_dt: 1.0        # s, fenêtre d'association fix ↔ keyframe
  max_speed: 3.0     # m/s, gate outliers (rejette les sauts ~73 m)
  # U6 : σ ADAPTATIF PAR FIX, GT-free — TESTÉ ET REJETÉ (RU5 161907 : ATE 1.62 vs
  # 1.47 pour σ fixe 1.8). Le bruit réel varie bien ×3.5 et le proxy MAD le suit
  # (corr. 0.64), mais l'imperfection résiduelle sur-raidit par endroits (adaptive_min
  # 0.9 < champion) → bilan négatif. Variante non testée si on y revient :
  # adaptive_min: 1.4. Activer : USBL_ADAPTIVE=true ./run_slam.sh.
  adaptive: False
  adaptive_k: 3.4
  adaptive_min: 0.9
  adaptive_max: 3.5

pz_samples: 0
pz_detection_rate: 0.3

# Seuil d'intensité du MAP (découplage SLAM/carte). DÉSACTIVÉ (0) : le découplage
# seuil-bas a échoué (features denses chargées de fond → ICP loops dégradé). On garde
# directement le seuil 140 STRUCTURE-ONLY côté feature_extraction, meilleur pour cloud
# ET loops. L'infra (intensité portée + helper) reste si besoin futur. cf. point-cloud.
map:
  threshold: 0.0     # RUN 1.3 (07-03) : export COMPLET (rendu seulement, poses intactes).
                     # Le filtre 255 se fait désormais OFFLINE (filter_cloud.py / analyse.sh)
                     # → on peut ENFIN comparer les clouds A↔C au même seuil (65, 140, 255…)
                     # au lieu de figer le choix au moment du run. L'intensité par point est
                     # dans le CSV. (Ancien réglage : 255.0, cf. historique git.)

# Cap de RENDU du nuage, découplé de la trajectoire (= C2 inline). Le theta iSAM2 est
# optimisé pour la POSITION (USBL+loops) → tracke la direction de trajectoire → swirl du
# cloud. En activant ci-dessous, chaque scan est rendu avec le cap COMPAS (-dr_theta) ;
# la position x,y reste iSAM2 (trajectoire INCHANGÉE). RViz + CSV directement dé-swirlés.
# Limite : retire le swirl mais ne reconstruit PAS les doigts du quai (cf. C_CAP_GTFREE).
cloud:
  use_compass_cap: False   # GT-free + USBL : la traj est bonne (1.4 m) → le theta POST-OPTIMISEUR
                           # est le bon cap pour rendre le cloud. (True = ancien hack compas+offset,
                           # utile seulement quand la traj était mauvaise.)
  cap_offset_deg: 162.0    # offset repère compas→monde (Aracati) — ignoré si use_compass_cap False

# Filtre de PERSISTANCE du nuage : ne garde que les voxels monde vus depuis >= min_obs
# keyframes distincts. Retire le backscatter diffus du fond (vu brièvement, balayé) en
# gardant les vraies structures (murs/quai, vues de plusieurs poses). 100% GT-free.
# cf. test poses-GT : le swirl = fond, pas l'odométrie.
persistence:
  enable: False     # OFF pour reproduire 120154 (baseline meilleure traj, cloud swirl assumé).
                    # NE réactiver QU'AVEC seuil intensité 140 (sinon inefficace). cf. ci-dessous :
                    # EFFICACE avec seuil intensité 140 (pas 80). Le retour du fond,
                    # à range ~constant (vehicle-relatif), balaie → un voxel monde n'est
                    # vu que brièvement (faible persistance) ; un vrai mur reste en vue
                    # longtemps (forte). 140 retire le voile faible, la persistance le
                    # fond brillant balayé. Validé offline run 214019. cf. point-cloud.
  resolution: 3.0   # m, voxel de comptage. 3m (pas 2) : tolère la dispersion des poses
                    # cmd_vel → les structures restent CONNECTÉES (2m les fragmentait).
  # min_obs DÉPEND DU RATE (plus le bag est lent, plus chaque voxel est vu de keyframes) :
  #   rate 4 → 15 ; rate 2 → 35 ; rate 1 → ~35-50. Réglé pour rate 1 (run final).
  # À robustifier ensuite (percentile auto, indépendant du rate). On peut resserrer
  # offline depuis le CSV exporté (qui garde >=min_obs) mais pas desserrer → régler BAS.
  min_obs: 35
